<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Engineering Blog | SoundEngg</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=3.6.1">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Google AdSense Universal Tag & Account Verification -->
    <meta name="google-adsense-account" content="ca-pub-4117687060036448">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4117687060036448" crossorigin="anonymous"></script>
</head>
<body class="landing-page">
    <header class="landing-nav">
        <div class="container nav-container">
            <a href="index.html" class="logo-link">
                <img src="assets/img/logo-dark.png" alt="SoundEngg Logo" class="brand-logo dark-logo">
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="app.html" class="btn btn-primary">Launch Console</a>
            </div>
            <!-- Mobile View Navigation Select Dropdown -->
            <div class="mobile-nav-dropdown-container">
                <button class="mobile-nav-toggle-btn btn-landing-nav-toggle" aria-label="Toggle Navigation Dropdown">
                    <span class="landing-nav-active-label">MENU</span>
                    <span class="material-symbols-outlined dropdown-arrow">arrow_drop_down</span>
                </button>
                <div class="mobile-nav-dropdown-menu landing-nav-dropdown-menu" style="display: none;">
                    <a href="index.html#features" class="mobile-nav-item">FEATURES</a>
                    <a href="pro.html" class="mobile-nav-item">PRO</a>
                    <a href="blog.html" class="mobile-nav-item">BLOG</a>
                    <a href="index.html#contact" class="mobile-nav-item">CONTACT</a>
                    <a href="app.html" class="mobile-nav-item active">LAUNCH</a>
                </div>
            </div>
            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const toggleBtn = document.querySelector('.btn-landing-nav-toggle');
                    const menu = document.querySelector('.landing-nav-dropdown-menu');
                    if (!toggleBtn || !menu) return;

                    toggleBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isVisible = menu.style.display === 'flex';
                        menu.style.display = isVisible ? 'none' : 'flex';
                        toggleBtn.classList.toggle('active', !isVisible);
                    });

                    document.addEventListener('click', (e) => {
                        if (!menu.contains(e.target) && e.target !== toggleBtn) {
                            menu.style.display = 'none';
                            toggleBtn.classList.remove('active');
                        }
                    });

                    // Sync active label based on current page/hash
                    const label = document.querySelector('.landing-nav-active-label');
                    if (label) {
                        const path = window.location.pathname;
                        if (path.includes('pro.html')) {
                            label.textContent = 'PRO';
                        } else if (path.includes('terms.html')) {
                            label.textContent = 'TERMS';
                        } else if (path.includes('privacy.html')) {
                            label.textContent = 'PRIVACY';
                        } else if (window.location.hash === '#contact') {
                            label.textContent = 'CONTACT';
                        } else if (window.location.hash === '#features') {
                            label.textContent = 'FEATURES';
                        }
                    }
                });
            </script>
        </div>
    </header>

    <main class="container" style="padding-top: 120px; padding-bottom: 100px;">
        <div class="blog-layout" style="height: auto;">
            <!-- Sidebar: Categories -->
            <aside class="blog-sidebar rugged-bevel brushed-metal" style="height: fit-content; position: sticky; top: 100px;">
                <h4 class="sidebar-title">CATEGORIES</h4>
                <ul class="category-list">
                    <li><button class="cat-btn active" data-cat="all">ALL TOPICS</button></li>
                    <li><button class="cat-btn" data-cat="consoles">CONSOLES & REVIEWS</button></li>
                    <li><button class="cat-btn" data-cat="arrays">LINE ARRAYS</button></li>
                    <li><button class="cat-btn" data-cat="dynamics">EQ & DYNAMICS</button></li>
                    <li><button class="cat-btn" data-cat="mics">MICROPHONES</button></li>
                    <li><button class="cat-btn" data-cat="cables">CABLES & SIGNAL</button></li>
                    <li><button class="cat-btn" data-cat="amps">AMPLIFIERS</button></li>
                    <li><button class="cat-btn" data-cat="plugins">PLUGINS</button></li>
                    <li><button class="cat-btn" data-cat="routing">ROUTING & NETWORK</button></li>
                    <li><button class="cat-btn" data-cat="acoustics">ACOUSTIC THEORY</button></li>
                    <li><button class="cat-btn" data-cat="live">LIVE TECHNIQUES</button></li>
                    <li><button class="cat-btn" data-cat="subs">SUBWOOFERS</button></li>
                    <li><button class="cat-btn" data-cat="tuning">SYSTEM TUNING</button></li>
                    <li><button class="cat-btn" data-cat="dante">DANTE & IP</button></li>
                    <li><button class="cat-btn" data-cat="wireless">WIRELESS & RF</button></li>
                    <li><button class="cat-btn" data-cat="power">POWER & INFRA</button></li>
                    <li><button class="cat-btn" data-cat="industry">INDUSTRY BIZ</button></li>
                    <li><button class="cat-btn" data-cat="india">INDIA SPECIFIC</button></li>
                </ul>
            </aside>

            <!-- Main Content Area -->
            <main class="blog-content">
                <div class="module-title-wrap" style="margin-bottom: 2rem;">
                    <h1 class="vfd-glow" style="font-size: 3rem; margin-bottom: 0.5rem; text-transform: uppercase;">Engineering Blog</h1>
                    <p style="color: var(--text-muted); font-size: 1rem;">Technical Deep Dives // SoundEngg Knowledge Base</p>
                </div>

                <!-- Global Search Bar -->
                <div class="global-search-container" style="margin-bottom: 2.5rem; max-width: 100%;">
                    <div class="search-wrapper global-search">
                        <input type="text" placeholder="Search blog articles..." id="blog-search-input">
                        <button id="btn-blog-search" class="rugged-btn search-submit">SEARCH</button>
                    </div>
                </div>
                
                <!-- Article Index (Grid) -->
                <div id="blog-index" class="article-grid">
                    <!-- BLOG_CARDS_PLACEHOLDER -->
                </div>
            </main>
        </div>
    </main>

    <footer class="landing-footer">
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 SoundEngg. Built by Engineers for Engineers.</p>
            </div>
        </div>
    </footer>

    <!-- Filter & Redirect Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Compatibility redirect for old dynamic URLs: blog.html?id=xxxx
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            if (articleId) {
                window.location.replace("blog/" + articleId + ".html");
                return;
            }

            const catBtns = document.querySelectorAll('.cat-btn');
            const searchInput = document.getElementById('blog-search-input');
            const cards = document.querySelectorAll('.article-card');
            
            let activeCategory = 'all';
            let searchQuery = '';

            function filterArticles() {
                cards.forEach(card => {
                    const cardCat = card.getAttribute('data-cat');
                    
                    const titleText = card.querySelector('.article-title').textContent.toLowerCase();
                    const excerptText = card.querySelector('.article-excerpt').textContent.toLowerCase();
                    const catText = card.querySelector('.cat-tag').textContent.toLowerCase();
                    
                    const matchesCategory = (activeCategory === 'all' || cardCat === activeCategory);
                    const matchesSearch = (!searchQuery || 
                                           titleText.includes(searchQuery) || 
                                           excerptText.includes(searchQuery) ||
                                           catText.includes(searchQuery));
                                           
                    if (matchesCategory && matchesSearch) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }

            // Category Button Clicks
            catBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    activeCategory = btn.getAttribute('data-cat');
                    catBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterArticles();
                });
            });

            // Search input typing
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase().trim();
                    filterArticles();
                });
            }

            // Card Clicks
            cards.forEach(card => {
                card.style.cursor = 'pointer';
                card.addEventListener('click', (e) => {
                    if (e.target.closest('a')) return;
                    const link = card.querySelector('.read-more');
                    if (link) {
                        window.location.href = link.getAttribute('href');
                    }
                });
            });
        });
    </script>
    <!-- Vercel Web Analytics & Speed Insights -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
