<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Engineering Blog | SoundEngg</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="landing-page">
    <header class="landing-nav">
        <div class="container nav-container">
            <a href="index.html" class="logo-link">
                <img src="assets/img/logo-dark.png" alt="SoundEngg Logo" class="brand-logo dark-logo">
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="app.html" class="btn btn-primary">Launch Console</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 120px; padding-bottom: 100px;">
        <div id="blog-content">
            <!-- Content will be injected here -->
        </div>
    </main>

    <footer class="landing-footer">
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 SoundEngg. Built by Engineers for Engineers.</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/blog-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentEl = document.getElementById('blog-content');
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (articleId) {
                renderArticle(articleId);
            } else {
                renderBlogList();
            }

            function renderBlogList() {
                let html = `
                    <h1 class="vfd-glow" style="font-size: 3rem; margin-bottom: 1rem;">ENGINEERING_BLOG</h1>
                    <p style="color: var(--text-muted); margin-bottom: 3rem;">Deep dives into the physics and technology of professional audio.</p>
                    <div class="blog-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem;">
                `;

                blogArticles.forEach(post => {
                    html += `
                        <div class="blog-card" style="background: var(--surface-low); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: transform 0.3s ease;">
                            <div style="padding: 2rem;">
                                <span style="color: var(--primary); font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;">${post.categoryLabel || post.category.toUpperCase()}</span>
                                <h3 style="margin: 1rem 0; font-size: 1.25rem;">${post.title}</h3>
                                <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem;">${post.excerpt}</p>
                                <a href="blog.html?id=${post.id}" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.5rem 1rem;">READ_ARTICLE</a>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                contentEl.innerHTML = html;
            }

            function renderArticle(id) {
                const article = blogArticles.find(a => a.id === id);
                if (!article) {
                    contentEl.innerHTML = `<h1>Article Not Found</h1><a href="blog.html">Back to Blog</a>`;
                    return;
                }

                // Update Title
                document.title = `${article.title} | SoundEngg Blog`;

                contentEl.innerHTML = `
                    <div class="article-reader" style="max-width: 800px; margin: 0 auto;">
                        <a href="blog.html" style="display: inline-flex; align-items: center; color: var(--primary); text-decoration: none; margin-bottom: 2rem; font-size: 0.9rem;">
                            <span class="material-symbols-outlined" style="margin-right: 0.5rem;">arrow_back</span> BACK_TO_INDEX
                        </a>
                        ${article.content}
                        <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                            <p style="color: var(--text-muted); font-size: 0.9rem;">Share this article:</p>
                            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                                <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(article.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank" class="btn btn-outline small-btn">Twitter</a>
                                <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" class="btn btn-outline small-btn">LinkedIn</a>
                            </div>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
